name: Build and Deploy TechBusiness RD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up variables
        run: |
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/techbusiness-rd:latest -t ${{ secrets.DOCKER_USERNAME }}/techbusiness-rd:${{ env.SHA_SHORT }} -t ${{ secrets.DOCKER_USERNAME }}/techbusiness-rd:${{ env.DATE }} .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/techbusiness-rd:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/techbusiness-rd:${{ env.SHA_SHORT }}
          docker push ${{ secrets.DOCKER_USERNAME }}/techbusiness-rd:${{ env.DATE }}

      - name: Trigger Render deploy
        run: |
          curl -X POST https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"